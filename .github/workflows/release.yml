name: Release

# Cut a GitHub Release when a v* tag is pushed.
# This package is intentionally NOT published to Hex — there is no
# `gleam publish` (or tylerbutler/actions/gleam-publish) step here, and
# there should never be one.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Setup environment
        uses: tylerbutler/actions/setup-gleam@ed7d5e5f1d4370a5ccf06503916e3c301102ab1c # ratchet:tylerbutler/actions/setup-gleam@main
        with:
          erlang-version: "28"
          gleam-version: "1.16.0"

      - name: Run tests
        run: just test

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --verify-tag --generate-notes
